<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 할일</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-bar">
    <span class="material-icons app-bar-icon">checklist_rtl</span>
    <h1 class="app-bar-title">오늘 할일</h1>
    <div class="app-bar-spacer"></div>
    <div id="app-bar-auth" class="app-bar-auth" hidden>
      <span id="user-email" class="user-email-label"></span>
      <button id="logout-btn" class="btn-text-light">로그아웃</button>
    </div>
  </header>

  <!-- 로그인 화면 -->
  <main id="login-screen" class="content">
    <div class="card login-card">
      <span class="material-icons login-icon">lock_open</span>
      <h2 class="login-title">오늘 할일</h2>

      <!-- 로그인 / 회원가입 탭 -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">로그인</button>
        <button class="auth-tab" data-tab="signup">회원가입</button>
      </div>

      <!-- 입력 필드 -->
      <input type="email" id="email-input" class="text-field" placeholder="이메일" autocomplete="email">
      <input type="password" id="password-input" class="text-field" placeholder="비밀번호" autocomplete="current-password">

      <!-- 로그인 버튼 -->
      <button id="login-btn" class="btn-contained login-submit-btn">로그인</button>

      <!-- 회원가입 버튼 (기본 숨김) -->
      <button id="signup-btn" class="btn-contained login-submit-btn" hidden>회원가입</button>

      <p id="login-msg" class="login-msg"></p>
    </div>
  </main>

  <!-- 앱 화면 (로그인 후 표시) -->
  <main id="app-screen" class="content" hidden>
    <!-- 입력 카드 -->
    <div class="card input-card">
      <input
        type="text"
        id="todo-input"
        class="text-field"
        placeholder="할 일을 입력하세요"
        maxlength="100"
      >
      <div class="input-actions">
        <select id="priority-input" class="priority-input-select" aria-label="우선순위 선택">
          <option value="high">높음</option>
          <option value="medium" selected>중간</option>
          <option value="low">낮음</option>
        </select>
        <button id="add-btn" class="btn-contained">
          <span class="material-icons" aria-hidden="true">add</span>
          <span>추가</span>
        </button>
      </div>
    </div>

    <!-- 필터 칩 -->
    <div class="filter-chips">
      <button class="chip active" data-filter="all">전체</button>
      <button class="chip" data-filter="active">미완료</button>
      <button class="chip" data-filter="completed">완료</button>
    </div>

    <!-- Todo 목록 -->
    <ul id="todo-list" class="todo-list"></ul>

    <p id="active-count" class="count-text"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="todo.js"></script>
</body>
</html>
